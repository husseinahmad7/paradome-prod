{% extends 'HusseinAh/base.html' %}
{% load static %}
{% block title %}
Send me Feedback
{% endblock title %}

{% block base %}
<main>
<div class="container" id="feedback">
    <fieldset id="feedbackform">
<form method="POST" hx-post="." hx-target="#feedback" hx-swap="outerHtml" hx-select="main">
    {% load crispy_forms_tags %}
        <legend>Feedback</legend>
    {% csrf_token %}
    {{ form|crispy }}
    <button id="submit-btn" class="button is-primary" type="submit" hx-post="." hx-target="#feedback" hx-swap="outerHtml" hx-select="main">
        Send
    </button>
    
</form>
</fieldset>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const feedback = document.querySelector("#feedback");
  const form = feedback ? feedback.querySelector("form") : null;
  const btn = document.querySelector("#submit-btn");

  if (!feedback || !form || !btn) {
    return;
  }

  feedback.addEventListener('htmx:afterRequest', function() {
    btn.classList.remove('is-loading');
    if (form.isConnected) {
      form.reset();
    }
  });

  feedback.addEventListener('htmx:beforeRequest', function() {
    btn.classList.add('is-loading');
  });
});
</script>
</main>
<script src="{% static 'js/htmx.min.js' %}" defer></script>

{% endblock base %}
